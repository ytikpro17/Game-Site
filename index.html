<!DOCTYPE html>
<html lang="uk">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Хрестики-Нулики</title>
	<link rel="stylesheet" href="Style.css">
	<style>
		h1 {
			margin-top: 30px;
			color: #333;
		}

		#board {
			display: grid;
			grid-template-columns: repeat(3, 100px);
			grid-gap: 5px;
			justify-content: center;
			margin-top: 20px;
		}

		.cell {
			width: 100px;
			height: 100px;
			font-size: 48px;
			background-color: #f0f0f0;
			border: 2px solid #333;
			cursor: pointer;
			transition: background-color 0.3s ease;
		}

		.cell:hover {
			background-color: #ddd;
		}

		#status {
			margin-top: 20px;
			font-size: 24px;
			color: #444;
		}

		#reset {
			margin-top: 15px;
			padding: 10px 20px;
			font-size: 18px;
			background-color: #007bff;
			color: white;
			border: none;
			border-radius: 5px;
			cursor: pointer;
		}

		#reset:hover {
			background-color: #0056b3;
	</style>
</head>
<body style="position: fixed;">

	<div class="header">      
		<div></div>
		<div class="nav"> 
			<a href="index.html">Хрестики-Нулики</a> 
			<a href="one.html">Тетріс</a>
			<a href="two.html">Змійка</a>
			<a href="tree.html">Шахи</a>

		</div> 
		<img src="https://o-complex.com/_next/image/?url=%2F_next%2Fstatic%2Fmedia%2Fuser.2628b789.png&w=3840&q=100" class="photo" height="50px" width="50px">
	</div>

	<h1>Гра: Хрестики-Нулики</h1>
	<div id="board"></div>
	<div id="status">Хід: X</div>
	<button id="reset">Скинути гру</button>

	<script>
		const board = document.getElementById('board');
		const status = document.getElementById('status');
		const reset = document.getElementById('reset');
		let currentPlayer = 'X';
		let cells = Array(9).fill(null);
		let gameOver = false;
		let score = { X: 0, O: 0 };

		function checkWinner() {
			const wins = [
				[0,1,2], [3,4,5], [6,7,8],
				[0,3,6], [1,4,7], [2,5,8],
				[0,4,8], [2,4,6]
			];
			for (let combo of wins) {
				const [a, b, c] = combo;
				if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
					return cells[a];
				}
			}
			return cells.includes(null) ? null : 'Нічия';
		}

		function handleClick(i) {
			if (cells[i] || gameOver) return;
			cells[i] = currentPlayer;
			render();
			const winner = checkWinner();
			if (winner) {
				if (winner !== 'Нічия') {
					score[winner]++;
					status.textContent = `Переможець: ${winner} | Рахунок — X: ${score.X}, O: ${score.O}`;
				} else {
					status.textContent = 'Нічия! Ніхто не переміг.';
				}
				gameOver = true;
			} else {
				currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
				status.textContent = `Хід: ${currentPlayer}`;
			}
		}

		function render() {
			board.innerHTML = '';
			cells.forEach((value, i) => {
				const cell = document.createElement('div');
				cell.className = 'cell';
				cell.textContent = value;
				cell.addEventListener('click', () => handleClick(i));
				board.appendChild(cell);
			});
		}

		reset.addEventListener('click', () => {
			cells = Array(9).fill(null);
			currentPlayer = 'X';
			gameOver = false;
			status.textContent = 'Хід: X';
			render();
		});

		render();
	</script>

</body>
</html>
